on:
  push:
    branches: [master]
    paths:
      - 'report/**'
      - '.github/workflows/render-report.yaml'

name: Render report to docs/

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render report
        run: quarto render report/bdbv_airport_screening.qmd --to html

      - name: Copy to docs/
        run: cp report/bdbv_airport_screening.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "Update rendered report [skip ci]"
          git push
