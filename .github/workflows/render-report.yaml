on:
  push:
    branches: [master]
    paths:
      - 'report/bdbv_airport_screening.html'

name: Copy report to docs/

jobs:
  copy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy to docs/
        run: cp report/bdbv_airport_screening.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "Update rendered report [skip ci]"
          git push
